<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProQuote AI | DEBUG VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono&display=swap');
        :root { --bg: #050508; --accent-cyan: #22d3ee; --accent-purple: #a78bfa; --text-main: #f8f8ff; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .glass { background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 0.75rem; color: #f1f5f9; width: 100%; padding: 0.75rem 1rem; outline: none; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: rgba(255, 255, 255, 0.7); padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; }
        .result-section { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .result-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem; }
        .result-value { font-size: 1rem; white-space: pre-wrap; }
        .hidden { display: none; }
        #version-tag { position: fixed; top: 10px; right: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-cyan); background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent-cyan); }
        @media print { body { background: white !important; color: black !important; } body * { visibility: hidden; } #printable-area, #printable-area * { visibility: visible; } #printable-area { position: absolute; left: 0; top: 0; width: 100%; } .result-section { border: 1px solid #ddd !important; color: black !important; } }
    </style>
</head>
<body>
    <div id="version-tag">VERSION: v20260430_FINAL_01 | STATUS: DEBUG_MODE</div>

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">ProQuote AI</h1>
            <p class="text-slate-400">Verification Build: Testing Data Binding</p>
        </div>

        <div class="glass">
            <div id="step-1" class="space-y-6">
                <h2 class="text-xl font-bold">1. Input Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="proj-name" class="glass-input" placeholder="Project Name">
                    <input type="text" id="client-name" class="glass-input" placeholder="Client Name">
                </div>
                <textarea id="proj-desc" class="glass-input h-32" placeholder="Full Project Description..."></textarea>
                <button onclick="nextStep(2)" class="btn-primary w-full">Next: Pricing →</button>
            </div>

            <div id="step-2" class="hidden space-y-6">
                <h2 class="text-xl font-bold">2. Pricing</h2>
                <select id="pricing-type" class="glass-input mb-4">
                    <option value="fixed">Fixed Price</option>
                    <option value="hourly">Hourly Rate</option>
                    <option value="package">Value Package</option>
                </select>
                <div class="flex gap-4">
                    <button onclick="nextStep(1)" class="btn-secondary">Back</button>
                    <button onclick="generateQuotation()" id="gen-btn" class="btn-primary flex-1">Generate Quote</button>
                </div>
            </div>

            <div id="step-3" class="hidden space-y-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">3. Final Result</h2>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="btn-secondary text-xs">PDF</button>
                        <button onclick="exportToExcel()" class="btn-secondary text-xs">Excel</button>
                    </div>
                </div>
                <div id="printable-area">
                    <div id="quotation-result" class="space-y-4"></div>
                </div>
                <button onclick="nextStep(1)" class="btn-secondary w-full mt-6">Start Over</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let currentQuoteData = [];

        function nextStep(step) {
            document.getElementById('step-' + currentStep).classList.add('hidden');
            document.getElementById('step-' + step).classList.remove('hidden');
            currentStep = step;
        }

        async function generateQuotation() {
            const btn = document.getElementById('gen-btn');
            const name = document.getElementById('proj-name').value.trim() || 'Unnamed Project';
            const client = document.getElementById('client-name').value.trim() || 'Valued Client';
            const desc = document.getElementById('proj-desc').value.trim() || 'No description provided.';
            const pricing = document.getElementById('pricing-type').value;

            console.log('DEBUG: Triggering Generation');
            console.log('DEBUG: Inputs ->', { name, client, desc, pricing });

            btn.disabled = true;
            btn.innerText = 'Processing...';

            await new Promise(r => setTimeout(r, 500));

            currentQuoteData = [
                { label: 'Client & Project', value: 'Client: ' + client + '\\nProject: ' + name },
                { label: 'Scope of Work', value: desc },
                { label: 'Pricing Model', value: 'Selected Model: ' + pricing + ' for ' + client },
                { label: 'Total Investment', value: pricing === 'fixed' ? '$6,500 USD' : pricing === 'hourly' ? '$4,000 - $8,000 USD' : '$7,200 USD' }
            ];

            const container = document.getElementById('quotation-result');
            container.innerHTML = '';
            currentQuoteData.forEach(item => {
                container.innerHTML += `
                    <div class="result-section">
                        <div class="result-label">${item.label}</div>
                        <div class="result-value">${item.value}</div>
                    </div>`;
            });

            console.log('DEBUG: Render Complete. Data:', currentQuoteData);
            btn.disabled = false;
            btn.innerText = 'Generate Quote';
            nextStep(3);
        }

        function exportToExcel() {
            if (!currentQuoteData.length) return;
            const data = currentQuoteData.map(item => [item.label, item.value]);
            const ws = XLSX.utils.aoa_to_sheet([["Field", "Details"], ...data]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Quote");
            XLSX.writeFile(wb, 'Quote_Export.xlsx');
        }
    </script>
</body>
</html>
